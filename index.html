<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasuku</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/lucide.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <svg class="logo-svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        <span class="logo-text">Tasuku</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" data-page="tasks">
        <svg class="nav-svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span class="nav-label">タスク管理</span>
      </button>
      <button class="nav-item" data-page="calendar">
        <svg class="nav-svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span class="nav-label">カレンダー</span>
      </button>
      <button class="nav-item" data-page="report">
        <svg class="nav-svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <span class="nav-label">日報</span>
      </button>
    </nav>
    <div class="sidebar-resizer" id="sidebarResizer"></div>
  </aside>

  <!-- Main Content -->
  <main class="main-content" id="mainContent">
    <!-- Tasks Page -->
    <div class="page active" id="page-tasks">
      <div class="page-header">
        <h1 class="page-title">タスク管理</h1>
      </div>
      <!-- 右上固定バー -->
      <div class="global-topbar">
        <label class="sort-label">並び替え</label>
        <select class="sort-select" id="sortSelect">
          <option value="status">ステータス順</option>
          <option value="project">案件名順</option>
          <option value="deadline">締切順</option>
        </select>
        <button class="btn-add" id="addTaskBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          タスク追加
        </button>
      </div>
      <div class="tasks-container" id="tasksContainer">
        <div class="loading-spinner">
          <div class="spinner"></div>
          <p>読み込み中…</p>
        </div>
      </div>
    </div>

    <!-- Calendar Page -->
    <div class="page" id="page-calendar">
      <div class="page-header">
        <h1 class="page-title">カレンダー</h1>
      </div>
      <div class="calendar-layout">
        <div class="calendar-main">
          <div class="calendar-nav">
            <button class="cal-nav-btn" id="prevMonth">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <h2 class="cal-month-title" id="calMonthTitle"></h2>
            <button class="cal-nav-btn" id="nextMonth">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>
          <div class="calendar-grid" id="calendarGrid"></div>
        </div>
        <div class="calendar-detail" id="calendarDetail">
          <h3 class="detail-title">日付を選択してください</h3>
          <div class="detail-list" id="detailList"></div>
        </div>
      </div>
    </div>

    <!-- Report Page -->
    <div class="page" id="page-report">
      <div class="page-header">
        <h1 class="page-title">日報</h1>
      </div>
      <div class="report-layout">
        <div class="report-form">
          <div class="prev-report-box" id="prevReportBox">
            <div class="prev-report-label">直近の日報 <span class="date-highlight" id="prevReportDate"></span></div>
            <div id="prevReportContent"><span class="prev-report-empty">直近の日報はまだありません</span></div>
          </div>
          <div class="form-group">
            <label class="form-label">対象日</label>
            <input type="date" class="form-input" id="reportDate" style="text-align:left;-webkit-appearance:none;appearance:none;">
          </div>
          <div class="form-group">
            <label class="form-label">今日やったこと</label>
            <textarea class="form-textarea" id="reportDone" rows="5" placeholder="・〇〇&#10;・〇〇"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">明日やること</label>
            <textarea class="form-textarea" id="reportTomorrow" rows="4" placeholder="・〇〇&#10;・〇〇"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">特記事項</label>
            <textarea class="form-textarea" id="reportMemo" rows="3" placeholder="連絡事項など"></textarea>
          </div>
          <button class="btn-generate" id="generateReportBtn">日報を生成</button>
        </div>
        <div class="report-output">
          <div class="output-header">
            <h3>プレビュー</h3>
            <button class="btn-copy" id="copyReportBtn" style="display:none">コピー</button>
          </div>
          <pre class="report-preview" id="reportPreview">日報を生成するとここに表示されます</pre>
        </div>
      </div>
    </div>
  </main>

  <!-- Task Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="taskModal">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">タスク追加</h2>
        <button class="modal-close" id="modalClose">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">案件名 <span class="required">*</span></label>
          <input type="text" class="form-input" id="taskProject" placeholder="案件名を入力">
        </div>
        <div class="form-group">
          <label class="form-label">タスク名 <span class="required">*</span></label>
          <input type="text" class="form-input" id="taskName" placeholder="タスク名を入力">
        </div>
        <div class="form-group">
          <label class="form-label">ステータス</label>
          <div class="status-btn-group" id="statusBtnGroup">
            <button class="status-btn active" data-status="要対応">要対応</button>
            <button class="status-btn" data-status="対応中">対応中</button>
            <button class="status-btn" data-status="確認中">確認中</button>
            <button class="status-btn" data-status="毎月対応">毎月対応</button>
            <button class="status-btn" data-status="完了">完了</button>
          </div>
          <input type="hidden" id="taskStatus" value="要対応">
        </div>
        <div class="form-group">
          <label class="form-label">納期</label>
          <input type="date" class="form-input" id="taskDeadline">
        </div>
        <div class="form-group">
          <label class="form-label">サブタスク</label>
          <div id="subtaskList"></div>
          <button class="btn-add-subtask" id="addSubtaskBtn">＋ サブタスク追加</button>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" id="modalCancel">キャンセル</button>
        <button class="btn-save" id="modalSave">保存</button>
      </div>
    </div>
  </div>


  <!-- Bottom Navigation (mobile only) -->
  <nav class="bottom-nav" id="bottomNav" style="display:none">
    <button class="bottom-nav-item active" data-page="tasks">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      タスク
    </button>
    <button class="bottom-nav-item" data-page="calendar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      カレンダー
    </button>
    <button class="bottom-nav-item" data-page="report">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      日報
    </button>
  </nav>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script type="module" src="js/firebase.js"></script>
  <script type="module" src="js/holidays.js"></script>
  <script type="module" src="js/tasks.js"></script>
  <script type="module" src="js/calendar.js"></script>
  <script type="module" src="js/report.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
