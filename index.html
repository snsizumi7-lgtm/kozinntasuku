<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasuku</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3b82f6">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Tasuku">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        <span class="logo-text">Tasuku</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" data-page="home">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>ホーム</span>
      </button>
      <button class="nav-item" data-page="report">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <span>日報</span>
      </button>
      <button class="nav-item" data-page="weekly">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>週次サマリー</span>
      </button>
    </nav>
    <div class="sidebar-resizer" id="sidebarResizer"></div>
  </aside>

  <main class="main-content">

    <!-- HOME -->
    <div class="page active" id="page-home">
      <div class="home-greeting" id="homeGreeting"></div>
      <div class="summary-cards" id="summaryCards"></div>

      <!-- 今日やること -->
      <div class="home-section">
        <div class="home-section-title">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          今日やること
          <span class="home-section-sub" id="todayFromReport">（前回日報より）</span>
        </div>
        <div class="today-tasks" id="todayTasks"><div class="loading-spinner"><div class="spinner"></div></div></div>
      </div>

      <!-- タスク一覧 -->
      <div class="home-section">
        <div class="home-section-title">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          タスク
        </div>
        <!-- フィルター -->
        <div class="task-filter-row" id="homeFilterBtns" style="margin-bottom:12px">
          <button class="task-filter-btn active" data-filter="all">未完了</button>
          <button class="task-filter-btn" data-filter="要対応">要対応</button>
          <button class="task-filter-btn" data-filter="対応中">対応中</button>
          <button class="task-filter-btn" data-filter="確認中">確認中</button>
          <button class="task-filter-btn" data-filter="毎月対応">毎月</button>
          <button class="task-filter-btn task-filter-done-btn" data-filter="完了">完了済み</button>
        </div>
        <!-- タスク一覧 -->
        <div id="homeTaskList"></div>
        <!-- クイック追加 -->
        <div class="home-quick-add" style="margin-top:10px">
          <input type="text" class="home-quick-input" id="homeQuickInput" placeholder="タスクをすぐ追加…">
          <button type="button" class="home-quick-btn" id="homeQuickBtn">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            追加
          </button>
        </div>
      </div>

      <!-- 今週完了 -->
      <div class="home-section">
        <div class="home-section-title">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          今週完了したタスク
          <span class="home-section-sub" id="weeklyDoneCount"></span>
        </div>
        <div id="weeklyDoneTasks"></div>
      </div>

      <!-- 週グラフ -->
      <div class="home-section">
        <div class="home-section-title">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          今週の追加数
        </div>
        <div class="dashboard-card" style="margin:0;padding:16px">
          <canvas id="weeklyChart" width="600" height="140"></canvas>
        </div>
      </div>
    </div>

    <!-- REPORT -->
    <div class="page" id="page-report">
      <div class="page-header"><h1 class="page-title">日報</h1></div>
      <div class="report-layout">
        <div class="report-form">
          <div class="form-group">
            <label class="form-label">対象日</label>
            <input type="date" class="form-input" id="reportDate" style="text-align:left;-webkit-appearance:none;">
          </div>
          <div class="form-group">
            <label class="form-label">今日やったこと</label>
            <textarea class="form-textarea" id="reportDone" rows="5" placeholder="・〇〇&#10;・〇〇"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">明日やること</label>
            <textarea class="form-textarea" id="reportTomorrow" rows="4" placeholder="・〇〇&#10;・〇〇"></textarea>
          </div>
          <div class="draft-indicator" id="draftIndicator" style="display:none">
            <span class="draft-dot"></span>下書き保存済み
          </div>
          <button class="btn-generate" id="generateReportBtn">日報を生成</button>
        </div>
        <div class="report-output">
          <div class="output-header">
            <h3>プレビュー</h3>
            <button class="btn-copy" id="copyReportBtn" style="display:none">コピー</button>
          </div>
          <pre class="report-preview" id="reportPreview">日報を生成するとここに表示されます</pre>
        </div>
      </div>
    </div>

    <!-- WEEKLY -->
    <div class="page" id="page-weekly">
      <div class="page-header">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
          <h1 class="page-title">週次サマリー</h1>
          <button class="btn-add" id="generateWeeklyBtn">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
            今週のサマリーを生成
          </button>
        </div>
      </div>
      <div class="weekly-week-selector" id="weeklyWeekSelector"></div>
      <div id="weeklySummaryOutput"></div>
      <div class="weekly-reports" id="weeklyReports"></div>
    </div>

  </main>

  <!-- Bottom nav (mobile) -->
  <nav class="bottom-nav" id="bottomNav" style="display:none">
    <button class="bottom-nav-item active" data-page="home">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      ホーム
    </button>
    <button class="bottom-nav-item" data-page="report">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      日報
    </button>
    <button class="bottom-nav-item" data-page="weekly">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      週次
    </button>
  </nav>

  <!-- Task Edit Modal -->
  <div class="modal-overlay" id="taskEditOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">タスク編集</h2>
        <button class="modal-close" id="taskEditClose">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">タスク名 <span class="required">*</span></label>
          <input type="text" class="form-input" id="editTaskName" placeholder="タスク名">
        </div>
        </div>
        <div class="form-group">
          <label class="form-label">サブタスク</label>
          <div id="editSubtaskList"></div>
          <button class="btn-add-subtask" id="addEditSubtaskBtn">＋ サブタスク追加</button>
        </div>
      </div>
      <div class="modal-footer" style="justify-content:space-between">
        <button class="btn-cancel" id="taskEditDelete" style="color:#ef4444;border-color:#fca5a5">削除</button>
        <div style="display:flex;gap:8px">
          <button class="btn-cancel" id="taskEditCancel">キャンセル</button>
          <button class="btn-save" id="taskEditSave">保存</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module" src="js/firebase.js"></script>
  <script type="module" src="js/holidays.js"></script>
  <script type="module" src="js/report.js"></script>
  <script type="module" src="js/home.js"></script>
  <script type="module" src="js/weekly.js"></script>
  <script type="module" src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
